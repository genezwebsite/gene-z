<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل المادة — Gene_Z</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="../assets/js/theme.js"></script>

  <style>
    body { font-family: 'Noto Kufi Arabic', sans-serif; }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-surface text-content transition-colors duration-300">

  <div id="site-header"></div>
  <div id="site-navbar"></div>

  <main class="flex-1 py-12 sm:py-16">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <a href="courses.html" class="inline-flex items-center gap-2 text-sm text-muted hover:text-accent transition-colors mb-8 font-medium">
        <span>&rarr;</span> العودة للمواد
      </a>

      <div id="course-content" class="card p-6 sm:p-10 mb-8 min-h-[40vh] relative">
        <div class="flex justify-center items-center h-full">
          <span class="text-muted">جاري تحميل البيانات...</span>
        </div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/courses-data.js"></script>
  <script src="../assets/js/main.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("course-content");
      
      // جلب الـ ID الخاص بالمادة من الرابط (مثال: ?id=bio101)
      const urlParams = new URLSearchParams(window.location.search);
      const courseId = urlParams.get("id");

      if (!courseId || !window.GeneZCourses) {
        showError("لم يتم العثور على المادة المطلوبة.");
        return;
      }

      // البحث عن المادة في قاعدة البيانات (localStorage)
      const courses = GeneZCourses.getCourses();
      const course = courses.find(c => c.id === courseId);

      if (!course) {
        showError("هذه المادة غير موجودة أو تم حذفها.");
        return;
      }

      renderCourseDetails(course);

      function showError(message) {
        container.innerHTML = `
          <div class="text-center py-12">
            <p class="text-xl font-bold text-red-500 mb-2">خطأ!</p>
            <p class="text-muted">${message}</p>
            <a href="courses.html" class="btn-primary mt-6 inline-block">تصفح المواد</a>
          </div>`;
      }

      function renderCourseDetails(course) {
        // نعتمد الأسماء العربية إذا كانت موجودة
        const title = course.titleAr || course.title;
        const description = course.descriptionAr || course.description;
        const catObj = GeneZCourses.CATEGORIES[course.category];
        const categoryLabel = catObj ? catObj.labelAr : "تصنيف غير معروف";
        const resources = course.resources || [];

        let resourcesHTML = "";
        
        if (resources.length === 0) {
          resourcesHTML = `<p class="text-sm text-muted italic bg-surface-secondary p-4 rounded-lg border border-theme text-center">لا يوجد ملفات أو شروحات مرفقة لهذه المادة حالياً.</p>`;
        } else {
          resourcesHTML = `<div class="grid gap-3 sm:grid-cols-2">` + resources.map(res => {
            const icon = res.type === 'video' ? '▶️' : '📄';
            return `
              <a href="${res.url}" target="_blank" class="flex items-center gap-3 p-4 rounded-lg border border-theme hover:border-accent hover:shadow-sm transition-all bg-surface group">
                <span class="text-xl">${icon}</span>
                <span class="font-medium text-sm group-hover:text-accent transition-colors">${res.name}</span>
              </a>
            `;
          }).join('') + `</div>`;
        }

        container.innerHTML = `
          <header class="mb-8 border-b border-theme pb-6">
            <span class="inline-block px-3 py-1 bg-surface-secondary text-xs rounded-full border border-theme text-muted mb-4 font-medium">
              ${categoryLabel}
            </span>
            <h1 class="text-3xl font-bold text-accent mb-4">${title}</h1>
            <p class="text-muted leading-relaxed">${description}</p>
          </header>

          <section>
            <h2 class="text-xl font-bold text-content mb-4 flex items-center gap-2">
              <span>📚</span> ملفات الشرح والمصادر
            </h2>
            ${resourcesHTML}
          </section>
        `;
      }
    });
  </script>
</body>
</html>
