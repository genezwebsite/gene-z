<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <link rel="icon" type="image/png" href="../assets/img/favicon-blue.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل المادة — Gene_Z</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="../assets/js/theme.js"></script>

  <style>
    body { font-family: 'Noto Kufi Arabic', sans-serif; }
    .file-tab.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
      border-bottom-width: 2px;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-surface text-content transition-colors duration-300">

  <div id="site-header"></div>
  <div id="site-navbar"></div>

  <main class="flex-1 py-10 sm:py-14">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <!-- زر العودة -->
      <a href="courses.html" class="inline-flex items-center gap-2 text-sm text-muted hover:text-accent transition-colors mb-6 font-semibold">
        <span>&rarr;</span> العودة لصفحة المواد
      </a>

      <!-- التنويه التحذيري -->
      <div class="mb-8 p-4 bg-amber-50 border-r-4 border-amber-500 rounded-lg text-amber-900 shadow-sm flex items-start gap-3">
        <span class="text-xl">⚠️</span>
        <div class="text-xs sm:text-sm leading-relaxed font-medium">
          <strong>تنويه هام من فريق Gene_Z:</strong> 
          هذه الشباتر والملخصات للاطلاع والمساعدة الدراسية، حيث من الممكن أن يتم تعديلها من قبل أستاذ أو مسؤول المادة في الجامعة. يمكنك الرجوع إليه دائماً للحصول على النسخة الرسمية.
        </div>
      </div>

      <!-- الحاوية الرئيسية لتفاصيل المادة -->
      <div id="course-content" class="min-h-[40vh] relative">
        <div class="card p-10 flex justify-center items-center h-full">
          <span class="text-muted font-semibold">جاري تحميل بيانات المادة من السحابة...</span>
        </div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/js/main.js"></script>
  
  <!-- السكربت الجديد للاتصال المباشر بقاعدة بيانات فايربيز -->
  <script type="module">
    import { db } from "../assets/js/firebase-init.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    
    // استيراد دالة تتبع التفاعل اللحظي (لتسجيل مرات التحميل)
    import { trackEvent } from "../assets/js/admin/admin-analytics.js";

    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById("course-content");
      const urlParams = new URLSearchParams(window.location.search);
      const courseId = urlParams.get("id");

      if (!courseId) {
        showError("لم يتم العثور على المادة المطلوبة في الرابط."); return;
      }

      try {
        // ✅ جلب البيانات من Cloud Firestore بدلاً من الملف الثابت المحذوف
        const docRef = doc(db, "genez_courses", courseId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          showError("هذه المادة غير موجودة في السحابة أو تم حذفها مؤخراً."); return;
        }

        const course = { id: docSnap.id, ...docSnap.data() };
        renderCourseDetails(course);

        // ✅ تسجيل حدث المشاهدة (View) بعد تحميل تفاصيل المادة بنجاح
        if (!window.hasTrackedThisCourseView) {
          trackEvent("genez_courses", courseId, "views");
          window.hasTrackedThisCourseView = true;
        }

      } catch (error) {
        console.error("Error fetching course details:", error);
        showError("حدث خطأ أثناء جلب بيانات المادة من السحابة. يرجى التأكد من اتصالك بالإنترنت.");
      }

      function showError(message) {
        container.innerHTML = `
          <div class="card p-10 text-center py-12">
            <p class="text-2xl font-bold text-red-500 mb-2">خطأ!</p>
            <p class="text-muted text-sm mb-6">${message}</p>
            <a href="courses.html" class="btn-primary inline-block px-6 py-2.5 rounded font-semibold text-sm">تصفح جميع المواد</a>
          </div>`;
      }

      function createFileCard(file, courseId) {
        const contributor = file.contributor || "فريق Gene_Z";
        const viewUrl = file.url || "#";
        const downUrl = file.downloadUrl || file.url || "#";
        
        // دالة onClick لتسجيل نقرة التحميل
        return `
          <div class="p-4 rounded-xl border border-theme bg-surface hover:border-accent hover:shadow-md transition-all flex flex-col justify-between gap-3 group">
            <div class="space-y-1.5">
              <span class="inline-block px-2 py-0.5 rounded bg-accent/10 text-accent font-bold text-[11px]">👤 مساهمة: ${contributor}</span>
              <h4 class="font-bold text-sm text-content group-hover:text-accent transition-colors leading-snug truncate" title="${file.name}">📄 ${file.name}</h4>
            </div>
            <div class="flex gap-2 pt-2 border-t border-theme">
              <a href="${viewUrl}" target="_blank" class="btn-outline flex-1 text-center py-1.5 text-xs rounded font-semibold text-blue-600 border-blue-200 hover:bg-blue-50"> معاينة</a>
              <!-- ✅ تسجيل حدث التحميل (Downloads) قبل الفتح -->
              <a href="${downUrl}" target="_blank" download onclick="window.trackEvent('genez_courses', '${courseId}', 'downloads');" class="btn-primary flex-1 text-center py-1.5 text-xs rounded font-semibold">⬇️ تنزيل</a>
            </div>
          </div>
        `;
      }

      function renderCourseDetails(course) {
        const titleAr = course.nameAr || course.titleAr || course.title || "مادة دراسية";
        const titleEn = course.nameEn || course.titleEn || "";
        const code = course.code || "";
        
        const catLabels = { "major-req": "تخصص إجباري", "major-opt": "تخصص اختياري", "college-req": "كلية إجبارية", "college-opt": "كلية اختيارية" };
        const categoryLabel = catLabels[course.type] || "متطلب عام";
        
        const files = course.files || course.resources || [];
        const chapters = files.filter(f => f.sectionKey === 'chapters' || !f.sectionKey);
        const summaries = files.filter(f => f.sectionKey === 'summaries');
        const pastPapers = files.filter(f => f.sectionKey === 'pastPapers');

        const noFilesHTML = `<div class="col-span-full text-center py-8"><p class="text-sm text-muted font-medium bg-surface-secondary p-4 rounded-lg border border-theme inline-block">لا توجد ملفات مرفوعة في هذا القسم حالياً.</p></div>`;

        container.innerHTML = `
          <!-- هيدر المادة -->
          <div class="card p-6 sm:p-8 mb-6 bg-surface shadow-sm border-theme border-b-4 border-b-accent">
            <div class="flex flex-wrap justify-between items-center gap-2 mb-3">
              <span class="font-mono bg-accent text-white font-bold px-3 py-1 rounded text-sm">${code}</span>
              <span class="text-xs font-semibold bg-surface-secondary px-3 py-1 rounded border border-theme text-muted">${categoryLabel}</span>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold text-content mb-1">${titleAr}</h1>
            ${titleEn ? `<p class="text-sm text-muted font-mono" dir="ltr">${titleEn}</p>` : ""}
          </div>

          <!-- نظام التبويبات للأقسام -->
          <div class="mb-6 border-b border-theme flex flex-wrap gap-2" id="course-file-tabs">
            <button type="button" class="file-tab active px-4 py-2 text-sm font-bold transition-colors" data-target="chapters-sec">📖 شباتر المادة (${chapters.length})</button>
            <button type="button" class="file-tab px-4 py-2 text-sm font-bold text-muted hover:text-content transition-colors" data-target="summaries-sec">📝 ملخصات وشروحات (${summaries.length})</button>
            <button type="button" class="file-tab px-4 py-2 text-sm font-bold text-muted hover:text-content transition-colors" data-target="pastpapers-sec">📑 أسئلة سنوات (${pastPapers.length})</button>
          </div>

          <!-- صناديق الملفات -->
          <div id="chapters-sec" class="file-section block">
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
              ${chapters.length > 0 ? chapters.map(f => createFileCard(f, course.id)).join('') : noFilesHTML}
            </div>
          </div>

          <div id="summaries-sec" class="file-section hidden">
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
              ${summaries.length > 0 ? summaries.map(f => createFileCard(f, course.id)).join('') : noFilesHTML}
            </div>
          </div>

          <div id="pastpapers-sec" class="file-section hidden">
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
              ${pastPapers.length > 0 ? pastPapers.map(f => createFileCard(f, course.id)).join('') : noFilesHTML}
            </div>
          </div>
        `;

        const tabs = container.querySelectorAll('.file-tab');
        const sections = container.querySelectorAll('.file-section');

        tabs.forEach(tab => {
          tab.addEventListener('click', () => {
            tabs.forEach(t => {
              t.classList.remove('active', 'text-accent');
              t.classList.add('text-muted');
            });
            tab.classList.remove('text-muted');
            tab.classList.add('active', 'text-accent');

            sections.forEach(sec => sec.classList.add('hidden'));
            document.getElementById(tab.getAttribute('data-target')).classList.remove('hidden');
          });
        });
      }
    });
  </script>
</body>
</html>
