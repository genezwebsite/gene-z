<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-en="Courses and Training — Gene_Z">الدورات والتدريب — Gene_Z</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script src="../assets/js/theme.js"></script>
  <style>
    body { font-family: 'Noto Kufi Arabic', sans-serif !important; }
  </style>
</head>
<body class="flex flex-col min-h-screen bg-surface text-content transition-colors duration-300">

  <div id="site-header"></div>
  <div id="site-navbar"></div>

  <main class="flex-1 py-12 sm:py-16">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <div class="mb-10 text-center md:text-start flex items-center gap-3 justify-center md:justify-start">
        <span class="text-4xl">🎓</span>
        <h1 class="text-3xl sm:text-4xl font-bold text-accent transition-colors duration-300" data-en="Additional Courses and Training">الدورات والتدريب الإضافي</h1>
      </div>
      
      <p class="text-muted max-w-2xl mb-8 text-center md:text-start" data-en="Develop your skills through a range of recommended courses, whether specialized in the field or soft skills.">
        طور مهاراتك من خلال مجموعة من الدورات الموصى بها، والتدريبات التي تدعم مسيرتك المهنية والأكاديمية.
      </p>

      <div class="mb-10">
        <label for="extra-search" class="form-label mb-2 block font-semibold text-accent" data-en="Search Courses">البحث في الدورات</label>
        <input
          type="search"
          id="extra-search"
          class="form-input w-full p-4 rounded-xl border border-theme bg-surface focus:border-accent outline-none transition-colors shadow-sm"
          placeholder="ابحث عن اسم الدورة أو محتواها..."
          autocomplete="off"
          data-en="Search for a course name or content..."
        />
      </div>

      <!-- شبكة عرض الدورات -->
      <div id="extra-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
         <div class="col-span-full flex flex-col items-center justify-center py-10">
            <div class="w-8 h-8 border-4 border-accent border-t-transparent rounded-full animate-spin mb-3"></div>
            <p class="text-sm font-semibold text-muted" data-en="Loading courses...">جاري تحميل الدورات...</p>
         </div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>
  <script src="../assets/js/courses-extra.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
